tasks:
- name: 'basecalling_basic' # Не больше 20 знаков
  applicable_samples: null
  version: '300626bab8'
  description: 'Базовый бейсколлинг, осуществляемый без модификаций'
  db_query: '{ "$expr": { "$gt": [ { "$size": { "$setDifference": [ "$source.s_id",
    "$res.s_id" ] } }, 0 ] } }'
  pipeline: 'nxf-csp/ont-basecalling'
  environment_variables: {}
  queue: 'gpu'
  load:
    cpus: 32
    ram: 128
    gpus: 1
  timeout: '1D'
  priority: true
  nxf_cfg_pipeline: 'basecalling_basic/nxf_basecalling.config' # может быть null
  process_factory: 'basecalling_basic/process_factory.py'
  result_factory: 'basecalling_basic/result_factory.py'
